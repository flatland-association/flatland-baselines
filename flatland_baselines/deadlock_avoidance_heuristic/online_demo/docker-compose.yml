services:
  redis:
    image: redis
    ports:
      - 6379:6379
    logging:
      options:
        max-size: "20m"
        max-file: "5"

  setup:
    image: alpine
    volumes:
      - scenarios:/scenarios
      - ${DATA_DIR:-./outputs}/analysis_data_dir:/tmp/analysis_data_dir/
      - ${DATA_DIR:-./outputs}/results:/tmp/results/
      - ${DATA_DIR:-./outputs}/actions:/tmp/actions/
      - ${DATA_DIR:-./outputs}/episodes:/tmp/episodes/
      - ${DATA_DIR:-./outputs}/visualizations:/tmp/visualizations
    entrypoint: [ "/bin/sh","-c" ]
    command:
      - |
        set -euxo pipefail
        chmod a+rwx -R /scenarios

        # download and extract debug-environments.zip to scenarios volume
        wget "https://data.flatland.cloud/benchmarks/Flatland3/debug-environments.zip" -O debug-environments.zip -O debug-environments.zip
        rm -fR /scenarios/debug-environments
        # data stored in debug-environments folder in zip
        unzip debug-environments.zip -o -d /scenarios/
        
        # download and extract environments_v2.zip to scenarios volume
        wget https://github.com/flatland-association/flatland-scenarios/raw/refs/heads/main/scenarios/environments_v2.zip -O environments_v2.zip
        rm -fR scenarios/environments_v2
        # data stored top-level in zip
        mkdir -p scenarios/environments_v2
        unzip environments_v2.zip -d scenarios/environments_v2

        find /scenarios

        # set permissions on scenarios volume and DATA_DIR
        chmod a+rwx -R /scenarios
        
        mkdir -p /tmp/analysis_data_dir/
        mkdir -p /tmp/results/
        mkdir -p /tmp/actions/
        mkdir -p /tmp/episodes/
        mkdir -p /tmp/visualizations
        
        chmod a+rwx -R /tmp/analysis_data_dir/
        chmod a+rwx -R /tmp/results/
        chmod a+rwx -R /tmp/actions/
        chmod a+rwx -R /tmp/episodes/
        chmod a+rwx -R /tmp/visualizations

  evaluator:
    build:
      context: evaluator
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_started
      setup:
        condition: service_completed_successfully
    environment:
      AICROWD_TESTS_FOLDER: /tmp/${ENVIRONMENTS:-debug-environments}/
      redis_ip: redis
      AICROWD_DEBUG_SUBMISSION: 1
    volumes:
      - type: volume
        source: scenarios
        target: /tmp/${ENVIRONMENTS:-debug-environments}/
        volume:
          subpath: ${ENVIRONMENTS:-debug-environments}
      - ${DATA_DIR:-./outputs}/analysis_data_dir:/tmp/analysis_data_dir/
      - ${DATA_DIR:-./outputs}/results:/tmp/results/
      - ${DATA_DIR:-./outputs}/actions:/tmp/actions/
      - ${DATA_DIR:-./outputs}/episodes:/tmp/episodes/
      - ${DATA_DIR:-./outputs}/visualizations:/tmp/visualizations
  submission:
    build:
      context: ../../..
      dockerfile: flatland_baselines/deadlock_avoidance_heuristic/online_demo/submission/Dockerfile
    depends_on:
      redis:
        condition: service_started
      setup:
        condition: service_completed_successfully
    environment:
      AICROWD_TESTS_FOLDER: /tmp/${ENVIRONMENTS:-debug-environments}/
      redis_ip: redis
    volumes:
      - type: volume
        source: scenarios
        target: /tmp/${ENVIRONMENTS:-debug-environments}/
        volume:
          subpath: ${ENVIRONMENTS:-debug-environments}

  shutdown-redis:
    image: redis
    entrypoint: [ "/bin/sh","-c" ]
    command:
      - |
        redis-cli -h redis -p 6379 shutdown now
    depends_on:
      evaluator:
        condition: service_completed_successfully
      submission:
        condition: service_completed_successfully
volumes:
  scenarios:
